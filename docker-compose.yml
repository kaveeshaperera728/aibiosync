version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: aibiosync_db
    restart: always
    environment:
      MYSQL_DATABASE: fingerprint_system
      MYSQL_ROOT_PASSWORD: strong_root_password
      MYSQL_USER: aibiosync_user
      MYSQL_PASSWORD: strong_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: aibiosync_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/fingerprint_system?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=aibiosync_user
      - SPRING_DATASOURCE_PASSWORD=strong_password

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aibiosync_frontend
    restart: always
    ports:
      - "80:80"

volumes:
  db_data:
